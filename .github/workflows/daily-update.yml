name: Daily Update Clawd.city

on:
  schedule:
    # 每天 UTC 00:00 執行 (台北時間 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Fetch latest OpenClaw releases
      id: fetch-releases
      run: |
        # 獲取 OpenClaw 最新 release
        curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest > release.json
        echo "release_data=$(cat release.json)" >> $GITHUB_OUTPUT
        
    - name: Fetch trending ClawdBots
      id: fetch-bots
      run: |
        # 這裡可以從你的數據庫或 API 獲取熱門 Bot
        # 示例：從 GitHub 搜索 clawdbot
        curl -s "https://api.github.com/search/repositories?q=clawdbot+in:name,description&sort=stars&order=desc&per_page=10" > bots.json
        echo "bots_data=$(cat bots.json)" >> $GITHUB_OUTPUT
        
    - name: Update website data
      run: |
        node scripts/update-data.js
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --staged --quiet || git commit -m "🤖 Daily update: $(date +%Y-%m-%d)"
        git push
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
